<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Logística - Flota</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="title-container">
            <h1>LOGÍSTICA Y TRANSPORTE</h1>
            <h2>Control de Flota en Tiempo Real</h2>
        </div>
        <div class="header-actions">
            <div class="datetime" id="current-datetime">
                <!-- La fecha y hora se inyectarán aquí -->
            </div>
            <a href="admin.html" class="btn-admin-link">Panel Admin</a>
        </div>
    </header>

    <main class="board-container">
        <div class="board-header">
            <div>Hora</div>
            <div>Placa</div>
            <div>Chofer</div>
            <div>Origen</div>
            <div>Destino</div>
            <div>Estado</div>
        </div>
        <div class="board-body" id="board-body">
            <div class="empty-state">Cargando información de camiones...</div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
